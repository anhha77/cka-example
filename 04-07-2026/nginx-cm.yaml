apiVersion: v1
kind: ConfigMap
metadata: 
  name: nginx-config
  namespace: default
data: 
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Welcome to Nginx</title>
      <style>
        :root {
          --bg: #0d1117;
          --panel: #12181f;
          --ink: #e6edf3;
          --muted: #7d8590;
          --line: #21262d;
          --accent: #1ec8a5;
          --accent-dim: #0f3d34;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
          min-height: 100vh;
          background:
            radial-gradient(900px 500px at 70% -10%, rgba(30,200,165,0.10), transparent 60%),
            radial-gradient(700px 500px at 0% 110%, rgba(30,200,165,0.06), transparent 55%),
            var(--bg);
          color: var(--ink);
          font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          display: grid;
          place-items: center;
          padding: 2rem;
        }
        .card {
          width: 100%;
          max-width: 620px;
          background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--panel);
          border: 1px solid var(--line);
          border-radius: 16px;
          padding: 3rem 3rem 2.25rem;
          box-shadow: 0 24px 60px -20px rgba(0,0,0,0.7);
        }
        .badge {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          font-size: 0.72rem;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: var(--accent);
          background: var(--accent-dim);
          border: 1px solid rgba(30,200,165,0.3);
          padding: 0.35rem 0.7rem;
          border-radius: 999px;
        }
        .dot {
          width: 7px; height: 7px; border-radius: 50%;
          background: var(--accent);
          box-shadow: 0 0 10px var(--accent);
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
        h1 {
          margin: 1.5rem 0 0.75rem;
          font-size: clamp(2rem, 5vw, 2.9rem);
          font-weight: 700;
          letter-spacing: -0.02em;
          line-height: 1.05;
        }
        h1 span { color: var(--accent); }
        p.lead {
          color: var(--muted);
          font-size: 1.02rem;
          line-height: 1.6;
          max-width: 46ch;
        }
        .meta {
          margin-top: 2rem;
          padding-top: 1.5rem;
          border-top: 1px solid var(--line);
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 1rem;
        }
        .meta div span {
          display: block;
          font-size: 0.7rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 0.3rem;
        }
        .meta div strong { font-size: 0.95rem; font-weight: 600; }
        .foot {
          margin-top: 2rem;
          font-size: 0.8rem;
          color: var(--muted);
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 0.5rem;
        }
        code {
          font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
          color: var(--accent);
        }
        @media (max-width: 480px) {
          .card { padding: 2rem 1.5rem; }
          .meta { grid-template-columns: 1fr; }
        }
      </style>
    </head>
    <body>
      <main class="card">
        <span class="badge"><span class="dot"></span> Server Online</span>
        <h1>Welcome to <span>Nginx</span></h1>
        <p class="lead">Your web server is up and running. This page is served from the default document root — replace it with your own <code>index.html</code> to go live.</p>

        <div class="meta">
          <div><span>Status</span><strong>200 OK</strong></div>
          <div><span>Server</span><strong>Nginx</strong></div>
          <div><span>Protocol</span><strong>HTTP/1.1</strong></div>
        </div>

        <div class="foot">
          <span>Powered by Nginx</span>
          <span>Configuration active</span>
        </div>
      </main>
    </body>
    </html>
      