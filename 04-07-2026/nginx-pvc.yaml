apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-nfs-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nginx-sc
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-longhorn-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
