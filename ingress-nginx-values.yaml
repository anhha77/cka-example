controller:
  service:
    type: LoadBalancer
    externalTrafficPolicy: "Local"
    loadBalancerIP: "10.0.0.200"
  containerPort:
    http: 80
    https: 443
  ingressClassResource:
    name: nginx
    enabled: true
    default: false
    controllerValue: k8s.io/ingress-nginx

  ingressClass: nginx